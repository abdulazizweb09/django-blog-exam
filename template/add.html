<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <div class="max-w-2xl mx-auto px-4 py-10">

        <a href="/articles/" class="text-blue-600 hover:underline">
            ← Orqaga
        </a>

        <div class="bg-white mt-4 rounded-2xl shadow-lg p-6 sm:p-8">

            <h1 class="text-2xl font-bold text-gray-800 mb-6">
                Yangi maqola qoshish
            </h1>

            <form method="post" class="space-y-5">
                {% csrf_token %}

                <div>
                    <label class="block text-gray-700 mb-1">Sarlavha</label>
                    <input type="text" name="title" required
                        class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-gray-700 mb-1">Matn</label>
                    <textarea name="context" rows="5" required
                        class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>
                <div>
                    <label for="taglar">Tag lar</label>
                    <select name="tag" id="taglar">
                        {% for t in tags %}
                            <option value="{{t.name}}">{{t.name}}</option>
                        {% endfor %}
                    </select>
                </div>

                <button type="submit"
                    class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition">
                    Saqlash
                </button>

            </form>

        </div>

    </div>

</body>
</html>
