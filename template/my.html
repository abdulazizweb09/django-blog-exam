<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maqolalar</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <div class="max-w-6xl mx-auto px-4 py-8">
        
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-8 gap-4">
            
            <h1 class="text-3xl sm:text-4xl font-bold text-gray-800">
                Mening Maqolalar
            </h1>

            <a href="/add/" 
               class="bg-green-600 text-white px-5 py-2 rounded-lg shadow hover:bg-green-700 transition text-center">
                + Qo‘shish
            </a>

        </div>
        <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
            
            {% for a in article %}
            <div class="bg-white rounded-2xl shadow-md hover:shadow-xl transition duration-300 p-5 flex flex-col justify-between">
                
                <div>
                    <h2 class="text-xl font-semibold text-gray-800 mb-2">
                        {{ a.title }}
                    </h2>
                    
                    <p class="text-gray-600 text-sm leading-relaxed line-clamp-4">
                        {{ a.context }}
                    </p>
                </div>

                <div class="mt-4">
                    <a href="/details/{{a.id}}" 
                       class="inline-block w-full text-center bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
                        Batafsil
                    </a>
                </div>

            </div>
            {% endfor %}

        </div>

    </div>

</body>
</html>
